<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#315f4d">
  <title>羊咩咩小組管理</title>
  <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
  <section id="loginView" class="center-screen">
    <form id="loginForm" class="card login-card">
      <div class="brand-row"><span class="logo">🐑</span><div><h1>羊咩咩小組</h1><p>雲端管理平台</p></div></div>
      <label>Email<input id="email" type="email" autocomplete="username" required></label>
      <label>密碼<input id="password" type="password" autocomplete="current-password" required></label>
      <button type="submit">登入</button>
      <p id="loginMsg" class="msg"></p>
    </form>
  </section>

  <div id="app" class="app" hidden>
    <aside>
      <div class="brand-row sidebar-brand"><span class="logo">🐑</span><div><strong>羊咩咩小組</strong><small>雲端正式版</small></div></div>
      <nav id="nav">
        <button data-page="dashboard" class="active">首頁</button>
        <button data-page="members">成員</button>
        <button data-page="meetings">聚會</button>
        <button data-page="prayers">代禱</button>
        <button data-page="interviews">一對一</button>
        <button data-page="account">帳號</button>
      </nav>
      <div class="sidebar-foot"><span id="who"></span><button id="logoutBtn" class="secondary">登出</button></div>
    </aside>
    <main>
      <header><div><h1 id="title">首頁</h1><p id="subtitle">掌握小組近況</p></div><button id="actionBtn" hidden>新增</button></header>
      <section id="content"></section>
    </main>
  </div>

  <dialog id="modal"><form method="dialog" id="modalForm"><div id="modalBody"></div></form></dialog>
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=1"></script>
</body>
</html>
