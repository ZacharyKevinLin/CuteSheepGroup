<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#325d4b">
  <title>羊咩咩小組管理 v13</title>
  <link rel="manifest" href="manifest.webmanifest?v=11.1">
  <link rel="stylesheet" href="styles.css?v=23">
</head>
<body>
  <section id="loginScreen" class="login-screen" hidden>
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">🐑</div>
        <div><h1 id="loginGroupName">羊咩咩小組</h1><p>MEMBER SIGN IN</p></div>
      </div>
      <div class="login-intro">
        <strong>歡迎回來</strong>
        <span>請選擇你的名字並輸入密碼。</span>
      </div>
      <form id="loginForm">
        <div class="field">
          <label>選擇成員</label>
          <select id="loginMember" required></select>
        </div>
        <div class="field">
          <label>密碼</label>
          <input id="loginPassword" type="password" inputmode="numeric" autocomplete="current-password" required placeholder="首次登入為生日 YYYYMMDD">
        </div>
        <p class="login-help">首次登入預設密碼為完整生日，例如 2001 年 2 月 8 日為 <strong>20010208</strong>。</p>
        <button class="primary login-submit" type="submit">登入</button>
        <p id="loginError" class="login-error" hidden></p>
      </form>
    </div>
  </section>
  <div class="app-shell" id="appShell" hidden>
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">🐑</div>
        <div><strong id="brandName">羊咩咩小組</strong><small>關懷與紀錄平台</small></div>
      </div>
      <nav id="nav">
        <button data-page="dashboard" class="active">⌂ <span>首頁</span></button>
        <button data-page="members">♙ <span>成員</span></button>
        <button data-page="meetings">✓ <span>聚會紀錄</span></button>
        <button data-page="interviews">♡ <span>一對一</span></button>
        <button data-page="analysis">▥ <span>小組分析</span></button>
        <button data-page="settings">⚙ <span>設定</span></button>
      </nav>
      <div class="version-badge">v23 · 登入提示優化</div><div class="privacy">🔒 資料只儲存在這台裝置的瀏覽器。共用裝置請勿使用。</div>
    </aside>

    <main>
      <header>
        <div>
          <h1 id="pageTitle">首頁</h1>
          <p id="pageSubtitle">掌握小組近況與需要關心的人</p>
        </div>
        <div class="header-actions"><button class="access-badge" id="accessBadge" type="button" title="帳號資訊">尚未登入</button><button class="secondary logout-btn" id="logoutButton" type="button">登出</button><button class="primary" id="mainAction">＋ 新增聚會</button></div>
      </header>
      <section id="view"></section>
    </main>
  </div>

  <dialog id="modal"><form method="dialog" id="modalForm"><div id="modalBody"></div></form></dialog>
  <div id="toast" class="toast"></div>

  <script src="initial-data.js?v=23"></script>
  <script src="app.js?v=23"></script>
</body>
</html>
